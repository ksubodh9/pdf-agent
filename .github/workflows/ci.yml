name: CI

# Runs the test suite (API + security regression tests) on every push and PR.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Auth tests mint their own HS256 tokens; conftest sets the secret.
        # Keep insecure auth OFF so we exercise real signature verification.
        env:
          ALLOW_INSECURE_AUTH: "false"
        run: pytest -v
