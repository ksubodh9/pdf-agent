version: "3.9"

# PDF Agent - Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys (including Supabase).
#   2. docker compose up --build
#   3. Backend API:  http://localhost:8000/docs
#      React app:   http://localhost:3000
#
# After changing Supabase/API keys you only need to restart, not rebuild:
#   docker compose restart frontend

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-agent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/vectorstore:/app/data/vectorstore
      - pdf_agent_db:/app/data/db
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/db/pdf_agent.db
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OMP_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - TOKENIZERS_PARALLELISM=false
      - FRONTEND_URL=http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 4g
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdf-agent-frontend
    ports:
      - "3000:80"
    # These are injected at runtime into window._env_ — no rebuild needed.
    # Values are read from the root .env file (same directory as this file).
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pdf_agent_db:
